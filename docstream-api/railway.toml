[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[nixpacks]
aptPackages = [
  "pandoc",
  "texlive-xetex",
  "texlive-latex-extra",
  "texlive-fonts-recommended",
  "texlive-fonts-extra",
  "texlive-science",
  "fonts-liberation",
  "tesseract-ocr",
]
